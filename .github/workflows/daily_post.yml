name: Trading TikTok Bot

on:
  workflow_dispatch: # Pour lancer manuellement
  schedule:
    - cron: '0 8 * * *' # Tous les jours à 8h

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANT pour le push
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 1. Gemini Brain
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python brain.py

      - name: 2. Animation Video
        run: python video_gen.py

      - name: 3. Save Files to Repo
        run: |
          git config --global user.name "TraderBot"
          git config --global user.email "bot@github.com"
          git add video_metadata.json avatar_talking.mp4 voice.mp3
          git commit -m "🚀 Nouvelle vidéo générée le $(date)" || exit 0
          git push
