name: TikTok Generator 2026 *

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # Tous les jours à 8h UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: 📂 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Install Python dependencies
        run: |
          pip install -r requirements.txt --break-system-packages --ignore-installed typing-extensions
          pip install tiktok-uploader playwright --break-system-packages
          python3 -m playwright install chromium
          python3 -m playwright install-deps

      - name: 🧠 Step 1 - Brain
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 brain.py

      - name: 🎙️ Step 2 - Video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 video_gen.py

      - name: 🎨 Step 3 - Background
        run: python3 background.py

      - name: 🎬 Step 4 - Composer
        run: python3 composer.py

      - name: 📲 Step 5 - Publish (TikTok via Cookies)
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: python3 uploader.py

      - name: 📤 Push Results & Cleanup
        run: |
          export HOME=/root
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add video_metadata.json
          git commit -m "Video Meta Update: $(date)" || echo "No changes"
          git push origin main
          rm -f final_video.mp4