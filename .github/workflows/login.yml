name: TikTok Generator 2026 *

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: 📂 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Install Python dependencies
        run: |
          pip install -r requirements.txt --break-system-packages --ignore-installed typing-extensions
          pip install playwright --break-system-packages
          python3 -m playwright install chromium
          python3 -m playwright install-deps

      - name: 📁 Vérifier présence login.py
        run: |
          echo "📂 Contenu du repo :"
          ls -lah
          echo "✅ login.py prêt à être utilisé sur le serveur"

      - name: 🚫 STOP volontaire
        run: |
          echo "⚠️ Connecte-toi maintenant à ton VPS et lance :"
          echo "python3 login.py"
          exit 1